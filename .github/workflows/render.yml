name: Render Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm ci --legacy-peer-deps
      
      - run: npx remotion render TravelMap video.mp4
      
      - uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: video.mp4
